<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Duolinkgone!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8B0000">
  <link rel="preload" href="englishVocabularys.js" as="script">

  <style>
body {
  font-family: Arial, sans-serif;

  background: linear-gradient(135deg,
#2b0000,
#5a0000,
#b31212,
#c73a3a,
#d65a5a,
#e08080
  );
  
  background-size: 300% 300%; /* 🔥 cho phép di chuyển */

  animation: gradientMove 40s linear infinite;

  height: auto;
  margin: 0;
  min-height: 100dvh;
  
  overscroll-behavior: none;
  touch-action: manipulation;

  display: flex;
  justify-content: center;
}






@keyframes gradientMove {
  0% {
    background-position: 100% 100%;
  }
  25% {
    background-position: 50% 80%;
  }
  50% {
    background-position: 0% 0%;
  }
  75% {
    background-position: 60% 20%;
  }
  100% {
    background-position: 100% 100%;
  }
}










#gameContent {
  width: 100%;
  max-width: 700px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  gap: 20px;

  margin: auto; /* 🔥 căn giữa trong box */
}









#menuBox {
  width: min(600px, 90%);
  min-height: 550px;
  height: auto;
  padding-top: 80px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  margin-top: 50px;
}



#menuBox h1 {
  font-size: 45px;
  color: white;
  margin-bottom: 20px;
  margin-top: 70px;

}



#menuBox button {
  width: 260px;
  height: 60px;
  font-size: 25px;
}











.box {
  width: min(900px, 95%);
  padding: 80px 60px;
  border-radius: 22px; 

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: #fff;

  min-height: 500px;

  display: flex;                /* 🔥 THÊM */
  flex-direction: column;       /* 🔥 THÊM */
  justify-content: center;      /* 🔥 CĂN GIỮA DỌC */
  align-items: center;          /* 🔥 CĂN GIỮA NGANG */

  text-align: center;

  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}








#question {
  margin-top: -10px;
  font-size: 60px;
  margin-bottom: 20px;
}





/* LV2 */
#question.question-choice {
  font-size: 60px;
  text-align: center;
  margin-top: -70px;
  color: #333;
}





/* LV3 */
#question.question-match {
  font-size: 36px;
  text-align: center;
  margin-top: -50px;
  color: #333;
}









input {
  font-size: 18px;
  padding: 16px;
  width: 60%;
  border-radius: 10px;
  border: 2px solid #000;
  margin-top: 15px;
}






button {
  font-size: 20px;
  padding: 12px 20px;
  margin: 10px 6px;
  background: linear-gradient(135deg, #FF4D4D, #8B0000);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s ;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

button:hover {
  background: linear-gradient(135deg, #ff5454, #9a0c0c);
  transform: translateY(-3px);
}








.hidden {
  display: none;
}







    #levelButtons {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center; /* 🔥 thêm cái này */
  height: 100%;
}



#levelButtons button {
  width: 100%;
  max-width: 400px; /* 🔥 tăng lên */
  font-size: 25px;  /* chữ to hơn */
  padding: 25px;    /* nút cao hơn */
  text-align: center;
  margin: 30px 5px;
  height: auto;
}










/* button back */
#settingsBtn {
  position: absolute;
  text-align: center;
  top: 15px;
  left: 15px;

  width: 40px;
  height: 40px;

  border-radius: 50%;
  border: none;

  background: rgba(0,0,0,0.6);
  color: white;
  font-size: 18px;

  cursor: pointer;
  transition: 0.2s;
}

#settingsBtn:hover {
  transform: scale(1.3);
  background: rgba(0,0,0,0.8);
}









/* 🌑 overlay */
.overlay {
  display: flex;
  justify-content: center;
  align-items: center;


  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);


  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 9999;
}

.overlay.show {
  opacity: 1;
  visibility: visible;
}









.popup {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;

  transform: scale(0.7);
  opacity: 0;
  transition: 0.3s;
  transform: scale(0.9) translateY(20px);
}




.overlay.show .popup {
  opacity: 1;
  transform: scale(1) translateY(0);
}






.box, .popup, .choice {
  will-change: transform;
}


* {
  -webkit-tap-highlight-color: transparent;
}


@media (max-width: 768px) {

  /* 🔥 CHẶN TRÀN NGANG TOÀN TRANG */
  html, body {
    overflow-x: hidden;
  }

  /* 🔥 LV2 - ép về 1 cột, không cho phần tử tự phình */
  #choices.choice-mode {
    display: grid;
    width: 100%;
    grid-template-columns: 1fr;
    gap: 15px;
  }

  /* 🔥 reset những thứ có thể gây tràn từ desktop */
  #choices.choice-mode > * {
    min-width: 0 !important;   /* cực quan trọng */
    
  }

  .choice {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    min-height: 70px;
    font-size: 16px;
    padding: 15px;
    word-break: break-word;
  }

  /* input cho gọn */

  /* giữ fix layout m đã làm */
  .box,
  #menuBox {
    position: relative;
    top: unset;
    left: unset;
    transform: none;
    margin: 20px auto;
  }

  .box { width: 95%; }

  #menuBox { margin-top: 40px; }

  .result-wrapper {
    flex-direction: column;
    gap: 20px;
    padding: 10px;
  }

  .result-main,
  .result-detail {
    min-width: 0 !important;
    width: 100%;
    margin-left: 0 !important;
  }

  .grade-buttons {
    flex-direction: column;
  }

  #question {
    font-size: clamp(22px, 5vw, 60px);
    line-height: 1.3;
    margin-top: 0;
  }

  #question.question-choice {
    font-size: 26px;
    margin-top: 0;
  }

  #question.question-match {
    font-size: 22px;
    margin-top: 0;
  }

  input {
    width: 95%;
    font-size: 16px;
  }

}







    /* 💥 RUNG */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.3s;
}

    /* ⭐ NGÔI SAO */
.star {
  position: absolute;
  top: 0px;
  right: 0px;

  color: gold;
  font-size: 30px;
  pointer-events: none;
  animation: fly 0.8s forwards;

}






  
@keyframes fly {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-40px) scale(1.5);
      }
      100% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }
}







#choices.choice-mode {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 300px));
  justify-content: center;
  align-items: center; /* 🔥 thêm */
  gap: 25px;
}



#choices.match-mode {
  display: flex;
  justify-content: center;
  gap: 60px; /* 🔥 rộng hơn */
  width: 100%;
}

.choice {
  width: 100%; /* 🔥 theo grid */
  min-height: 90px;

  font-size: 20px;
  padding: 20px;

  box-sizing: border-box;

  display: flex;
  align-items: center;
  justify-content: center;

  text-align: center;

  background: #dddcdc;
  border-radius: 12px;

  cursor: pointer;

  font-weight: 500;

  border: 2px solid transparent;

  transition: 0.2s;
 
}

.choice.selected {
  border: 2px solid black;
  transform: scale(1.05);
}


.choice:hover {
  background: #e0e0e0;
  transform: scale(1.05);
}





/* đúng */
.choice.correct {
  background: #4aff0d;
  border-color: #2ecc00;
  border: none;
  animation: correctFlash 0.3s;
}


@keyframes correctFlash {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}









/* sai */
.choice.wrong {
  background: #ff3535;
  color: white;
  border-color: #cc0000;
  border: none;
  animation: wrongShake 0.3s;
}

@keyframes wrongShake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  50% { transform: translateX(4px); }
  75% { transform: translateX(-4px); }
  100% { transform: translateX(0); }
}






.true input { border: 2px solid #4aff0d; }
.wrong input { border: 2px solid #ff3535; }













/* 🎬 transition câu hỏi */
.slide-out {
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.3s ease;
}

.slide-in {
  opacity: 0;
  transform: translateY(20px) scale(0.95);
}

.slide-in.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.3s ease;
}

/* 🎯 choices cũng mượt theo */
.choices-out {
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.25s ease;
}

.choices-in {
  opacity: 0;
  transform: translateY(10px);
}

.choices-in.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.25s ease;
}







.fade {
  opacity: 0;
  transition: 0.3s;
}







#streakBarContainer {
  position: absolute;
  top: -20px;
  left: 0;
  width: 100%;
  height: 8px;
  background: rgba(0,0,0,0.1);
  border-radius: 20px;
  overflow: hidden;

  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
}

/* khi hiện */
#streakBarContainer.show {
  opacity: 1;
  transform: translateY(0);
}

#streakBar {
  background: linear-gradient(90deg, 
    red, orange, yellow, green, cyan, blue, violet
  );
  background-size: 300% 100%;
  animation: rainbowMove 2s linear infinite;
  height: 100%;
  width: 0%;
  transition: width 0.3s;
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}
@keyframes rainbowMove {
  0% { background-position: 0% 0; }
  100% { background-position: 100% 0; }
}








.settings-popup {
  z-index: 10000;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);

  background: white;
  padding: 20px;
  border-radius: 15px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.2);

  text-align: center;
  z-index: 1000;

  opacity: 0;
  transition: 0.3s;
}





.settings-popup.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}




.settings-popup button {
  display: block;
  width: 180px;
  margin: 10px auto;
}




.settings-popup .exit {
  background: linear-gradient(135deg, #ff1744, #d50000);
}







.grade-buttons {
  display: flex;              /* 🔥 QUAN TRỌNG NHẤT */
  justify-content: center;
  gap: 20px;

  max-width: 500px;           /* tăng cho rộng hơn */
  margin: 20px auto;
}

.grade-buttons button {
  flex: 1;                    /* chia đều chiều ngang */
  padding: 20px;
  font-size: 20px;
}








.result-container {
  position: relative;
  width: 300px;
  overflow: hidden;
}





.next-btn {
  position: absolute;
  right: -20px;
  top: 50%;
  transform: translateY(-50%);

  background: #333;
  color: white;
  width: 30px;
  height: 50px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 8px;
  cursor: pointer;
}






.wrong-item {
  margin-bottom: 15px;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}






/* bảng sai */
.wrong-table {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 10px;
}

/* mỗi dòng */
.wrong-row {
  background: #f9f9f9;
  border-radius: 10px;
  padding: 10px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* từ vựng */
.wrong-word {
  font-weight: bold;
  font-size: 25px; /* 🔥 to hơn nữa */
}

.wrong-user,
.wrong-correct {
  text-align: left;
  font-size: 20px;
}


.wrong-row:hover {
  transform: scale(1.03);
  transition: 0.2s;
}






.popup-result {
  width: 100%;
  max-width: 1100px;
  margin: auto;
  animation: scaleUp 0.3s ease;
}


@keyframes scaleUp {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}



/* 🔥 wrapper chứa cả 2 bảng */
.result-wrapper {
  display: flex;
  align-items: stretch; /* 🔥 2 bảng cao bằng nhau */

  gap: 40px;

  width: 100%;
  max-width: 1300px;

  margin: auto;
  justify-content: center; /* đã có rồi nhưng giữ chắc */
}




/* 👉 bảng kết quả */
.result-main {
  flex: 1;
  min-width: 400px;

  background: white;
  border-radius: 10px;
  padding: 35px;
  margin-left: -40px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}





/* 👉 bảng sai */
.result-detail {
  flex: 1;
  min-width: 500px;
  max-height: 600px;

  background: white;
  border-radius: 10px;
  padding: 25px;


  overflow-y: auto;

  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}


  .result-main h2 {
  font-size: 50px;
}

  .result-main p {
  font-size: 30px;
  text-align: left;
  padding: 10px;
  margin: 10px;
}


.result-detail h3 {
  font-size: 27px;
}




.overlay.result-mode {
  align-items: center;
  justify-content: center;
  padding: 20px;
}



.overlay.result-mode .popup {
  background: transparent;
  box-shadow: none;
  padding: 0;
}

  </style>
</head>




<body spellcheck="false">
<button id="settingsBtn" class="hidden" onclick="openSettings()">⚙️</button>


<div class="overlay" id="overlay">
  <div class="popup" id="popup"></div>
</div>






<div id="menuBox">
  <h1>🔥 Duolinkgone 🔥</h1>
  <button onclick="goToGame()">▶️ Chơi</button>
  <button onclick="showLeaderboard()">🏆 BXH</button>
</div>




<div id="gradePopup" class="overlay">
  <div class="popup">
  <h3 style="font-size: 25px;">📚 Bạn học lớp mấy?</h3>

  <div class="grade-buttons">
    <button onclick="selectGrade(10)">Lớp 10</button>
    <button onclick="selectGrade(11)">Lớp 11</button>
    <button onclick="selectGrade(12)">Lớp 12</button>
  </div>
</div>
</div>






<div class="box hidden" id="box">



  <div id="streakBarContainer">
    <div id="streakBar"></div>
  </div>

  <div id="gameContent">

    <div id="levelButtons">
      <button onclick="startGame(1)">Level 1<br>Kiểu tự luận</br></button>
      <button onclick="startGame(2)">Level 2<br>Kiểu trắc nghiệm</br></button>
      <button onclick="startGame(3)">Level 3<br>Kiểu nối từ</br></button>
    </div>

    <h2 id="question" class="hidden">🔥 Chọn level 🔥</h2>
    <input id="answer" class="hidden">
    <button id="submitBtn" onclick="submitAnswer()" class="hidden">Trả lời</button>

    <div id="choices" class="hidden"></div>

  </div>



</div>








<div>
  <p id="result"></p>
  <p id="score"></p>
  <p id="finalResult"></p>
</div>







<div class="overlay" id="settingsOverlay">
  <div id="settingsPopup" class="popup">
    <h3 style="font-size: 25px;">⚙️ Tùy chọn</h3>
    <button onclick="closeSettings()">▶️ Tiếp tục</button>
    <button class="exit" onclick="exitGame()">❌ Thoát game</button>
  </div>
</div>





<script src="englishVocabularys.js"></script>
<script src="englishCode.js"></script>


<audio id="sound-correct" src="correct.mp3" preload="auto"></audio>
<audio id="sound-wrong" src="wrong.mp3" preload="auto"></audio>
<audio id="sound-finish" src="finish.mp3" preload="auto"></audio>

</body>
</html>
